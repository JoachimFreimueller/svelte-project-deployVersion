name: Deploy to GitHub Pages

on:
  push:
    branches: 'main'

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Hier sagen wir GitHub, wo die lock-Datei liegt:
          cache-dependency-path: Webshop/package-lock.json

      - name: Install dependencies
        # 'working-directory' sorgt dafür, dass npm im richtigen Ordner sucht
        working-directory: Webshop
        run: npm i

      - name: Build
        working-directory: Webshop
        env:
          # Das stellt sicher, dass SvelteKit den richtigen Pfad für GitHub Pages nutzt
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # WICHTIG: Hier muss auch der Pfad zum Build-Ordner im Unterordner stehen
          path: 'Webshop/build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
